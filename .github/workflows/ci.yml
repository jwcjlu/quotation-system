name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  backend-test:
    runs-on: ubuntu-latest
    env:
      ACR_REGISTRY: crpi-w9bl1lqh2u0svuwc.cn-guangzhou.personal.cr.aliyuncs.com
      ACR_REPOSITORY: caichip/quotation-system
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Go Test
        env:
          CGO_ENABLED: 0
        run: go test ./...

      - name: Build server image
        run: docker build -f Dockerfile.server -t caichip-server:ci .

      - name: Set up Docker Buildx
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build and push server image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: |
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}:${{ github.sha }}
            ${{ env.ACR_REGISTRY }}/${{ env.ACR_REPOSITORY }}:latest

  web-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Install deps
        run: npm ci

      - name: Build web
        run: npm run build
