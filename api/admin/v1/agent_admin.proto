syntax = "proto3";

package api.admin.v1;

import "google/api/annotations.proto";
import "google/protobuf/struct.proto";
import "google/protobuf/timestamp.proto";

option go_package = "caichip/api/admin/v1;v1";

// AgentAdminService 运维查询：Agent 在线状态、租约中任务、已安装脚本（鉴权见 bootstrap.agent_admin.api_keys，与 Agent 采集 API 分离）。
service AgentAdminService {
  rpc ListAgents(ListAgentsRequest) returns (ListAgentsReply) {
    option (google.api.http) = {
      get: "/api/v1/admin/agents"
    };
  }
  rpc ListAgentLeasedTasks(ListAgentLeasedTasksRequest) returns (ListAgentLeasedTasksReply) {
    option (google.api.http) = {
      get: "/api/v1/admin/agents/{agent_id}/leased-tasks"
    };
  }
  rpc ListAgentInstalledScripts(ListAgentInstalledScriptsRequest) returns (ListAgentInstalledScriptsReply) {
    option (google.api.http) = {
      get: "/api/v1/admin/agents/{agent_id}/installed-scripts"
    };
  }
  // Agent × script_id 登录凭据（密码不落库明文；下发见 TaskObject.params.platform_auth）
  rpc ListAgentScriptAuths(ListAgentScriptAuthsRequest) returns (ListAgentScriptAuthsReply) {
    option (google.api.http) = {
      get: "/api/v1/admin/agents/{agent_id}/script-auths"
    };
  }
  rpc UpsertAgentScriptAuth(UpsertAgentScriptAuthRequest) returns (UpsertAgentScriptAuthReply) {
    option (google.api.http) = {
      put: "/api/v1/admin/agents/{agent_id}/script-auths/{script_id}"
      body: "*"
    };
  }
  rpc DeleteAgentScriptAuth(DeleteAgentScriptAuthRequest) returns (DeleteAgentScriptAuthReply) {
    option (google.api.http) = {
      delete: "/api/v1/admin/agents/{agent_id}/script-auths/{script_id}"
    };
  }
  // BOM 采集平台（platform_id 与 script_id 一一对应；run_params 为键值对象，服务端展开为 TaskObject.argv 前缀）
  rpc ListBomPlatforms(ListBomPlatformsRequest) returns (ListBomPlatformsReply) {
    option (google.api.http) = {
      get: "/api/v1/admin/bom-platforms"
    };
  }
  rpc GetBomPlatform(GetBomPlatformRequest) returns (GetBomPlatformReply) {
    option (google.api.http) = {
      get: "/api/v1/admin/bom-platforms/{platform_id}"
    };
  }
  rpc UpsertBomPlatform(UpsertBomPlatformRequest) returns (UpsertBomPlatformReply) {
    option (google.api.http) = {
      put: "/api/v1/admin/bom-platforms/{platform_id}"
      body: "*"
    };
  }
  rpc DeleteBomPlatform(DeleteBomPlatformRequest) returns (DeleteBomPlatformReply) {
    option (google.api.http) = {
      delete: "/api/v1/admin/bom-platforms/{platform_id}"
    };
  }
}

message ListAgentsRequest {}

message AgentSummary {
  string agent_id = 1;
  string queue = 2;
  string hostname = 3;
  google.protobuf.Timestamp last_task_heartbeat_at = 4;
  bool online = 5;
  // 展示用：online | offline | unknown（无 last_task_heartbeat_at）
  string status = 6;
}

message ListAgentsReply {
  repeated AgentSummary agents = 1;
  // 离线判定窗口（秒），与 bootstrap agent.offline_min_sec、default_task_heartbeat_sec、offline_heartbeat_multiplier 一致
  int32 offline_window_sec = 2 [json_name = "offlineWindowSec"];
}

message ListAgentLeasedTasksRequest {
  string agent_id = 1;
}

message LeasedTaskRow {
  string task_id = 1;
  string script_id = 2;
  string version = 3;
  google.protobuf.Timestamp leased_at = 4;
  google.protobuf.Timestamp lease_deadline_at = 5;
}

message ListAgentLeasedTasksReply {
  repeated LeasedTaskRow tasks = 1;
}

message ListAgentInstalledScriptsRequest {
  string agent_id = 1;
}

message InstalledScriptRow {
  string script_id = 1;
  string version = 2;
  string env_status = 3;
  google.protobuf.Timestamp updated_at = 4;
}

message ListAgentInstalledScriptsReply {
  repeated InstalledScriptRow scripts = 1;
}

message ListAgentScriptAuthsRequest {
  string agent_id = 1;
}

message AgentScriptAuthRow {
  string script_id = 1;
  string username = 2;
  google.protobuf.Timestamp updated_at = 3;
}

message ListAgentScriptAuthsReply {
  repeated AgentScriptAuthRow rows = 1;
}

message UpsertAgentScriptAuthRequest {
  string agent_id = 1;
  string script_id = 2;
  string username = 3;
  string password = 4;
}

message UpsertAgentScriptAuthReply {}

message DeleteAgentScriptAuthRequest {
  string agent_id = 1;
  string script_id = 2;
}

message DeleteAgentScriptAuthReply {}

// ========== BOM 采集平台 ==========

message ListBomPlatformsRequest {}

message BomPlatformRow {
  string platform_id = 1;
  string script_id = 2;
  string display_name = 3;
  bool enabled = 4;
  google.protobuf.Struct run_params = 5;
  google.protobuf.Timestamp updated_at = 6;
}

message ListBomPlatformsReply {
  repeated BomPlatformRow items = 1;
}

message GetBomPlatformRequest {
  string platform_id = 1;
}

message GetBomPlatformReply {
  BomPlatformRow item = 1;
}

message UpsertBomPlatformRequest {
  string platform_id = 1;
  string script_id = 2;
  string display_name = 3;
  bool enabled = 4;
  google.protobuf.Struct run_params = 5;
}

message UpsertBomPlatformReply {
  BomPlatformRow item = 1;
}

message DeleteBomPlatformRequest {
  string platform_id = 1;
}

message DeleteBomPlatformReply {}
