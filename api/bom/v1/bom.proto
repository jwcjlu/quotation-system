// ---------- HS 元数据（管理页 /api/hs/meta/*）----------

service HsMetaService {
  rpc ListHsMeta(HsMetaListRequest) returns (HsMetaListReply) {
    option (google.api.http) = {
      get: "/api/hs/meta/list"
    };
  }
  rpc CreateHsMeta(HsMetaCreateRequest) returns (HsMetaMutationReply) {
    option (google.api.http) = {
      post: "/api/hs/meta/create"
      body: "*"
    };
  }
  rpc UpdateHsMeta(HsMetaUpdateRequest) returns (HsMetaMutationReply) {
    option (google.api.http) = {
      post: "/api/hs/meta/update"
      body: "*"
    };
  }
  rpc DeleteHsMeta(HsMetaDeleteRequest) returns (HsMetaMutationReply) {
    option (google.api.http) = {
      post: "/api/hs/meta/delete"
      body: "*"
    };
  }
}

message HsMetaListRequest {
  int32 page = 1;
  int32 page_size = 2;
  string category = 3;
  string component_name = 4;
  string core_hs6 = 5;
  // 空=不过滤；"1"/"true"=仅启用；"0"/"false"=仅停用
  string enabled = 6;
}

message HsMetaListRow {
  int64 id = 1;
  string category = 2;
  string component_name = 3;
  string core_hs6 = 4;
  string description = 5;
  bool enabled = 6;
  int32 sort_order = 7;
  string updated_at = 8;
}

message HsMetaListReply {
  repeated HsMetaListRow items = 1;
  int64 total = 2;
}

message HsMetaCreateRequest {
  string category = 1;
  string component_name = 2;
  string core_hs6 = 3;
  string description = 4;
  bool enabled = 5;
  int32 sort_order = 6;
}

message HsMetaUpdateRequest {
  int64 id = 1;
  string category = 2;
  string component_name = 3;
  string core_hs6 = 4;
  string description = 5;
  bool enabled = 6;
  int32 sort_order = 7;
}

message HsMetaDeleteRequest {
  int64 id = 1;
}

message HsMetaMutationReply {
  string ok = 1;
}
