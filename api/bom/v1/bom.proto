syntax = "proto3";

package api.bom.v1;

import "google/api/annotations.proto";

option go_package = "caichip/api/bom/v1;v1";

// BOM 配单服务
service BomService {
  // 上传并解析 BOM
  rpc UploadBOM(UploadBOMRequest) returns (UploadBOMReply) {
    option (google.api.http) = {
      post: "/api/v1/bom/upload"
      body: "*"
    };
  }

  // 多平台搜索报价
  rpc SearchQuotes(SearchQuotesRequest) returns (SearchQuotesReply) {
    option (google.api.http) = {
      post: "/api/v1/bom/search"
      body: "*"
    };
  }

  // 自动配单
  rpc AutoMatch(AutoMatchRequest) returns (AutoMatchReply) {
    option (google.api.http) = {
      post: "/api/v1/bom/match"
      body: "*"
    };
  }

  // 下载 BOM 模板
  rpc DownloadTemplate(DownloadTemplateRequest) returns (DownloadTemplateReply) {
    option (google.api.http) = {
      get: "/api/v1/bom/template"
    };
  }

  // 获取 BOM 详情（含解析结果）
  rpc GetBOM(GetBOMRequest) returns (GetBOMReply) {
    option (google.api.http) = {
      get: "/api/v1/bom/{bom_id}"
    };
  }

  // 获取配单结果
  rpc GetMatchResult(GetMatchResultRequest) returns (GetMatchResultReply) {
    option (google.api.http) = {
      get: "/api/v1/bom/{bom_id}/match"
    };
  }

  // 配单用到的报价缓存摘要（按行×平台；不含 quotes_json 大字段，详情另拉）
  rpc ListMatchSourceRecords(ListMatchSourceRecordsRequest) returns (ListMatchSourceRecordsReply) {
    option (google.api.http) = {
      get: "/api/v1/bom/{bom_id}/match-sources"
    };
  }

  // 单行×单平台的报价缓存明细（quotes_json / outcome 等）
  rpc GetMatchSourceDetail(GetMatchSourceDetailRequest) returns (GetMatchSourceDetailReply) {
    option (google.api.http) = {
      get: "/api/v1/bom/{bom_id}/match-sources/detail"
    };
  }

  // ---------- BOM 会话（货源搜索 / 轮询就绪）----------

  rpc CreateSession(CreateSessionRequest) returns (CreateSessionReply) {
    option (google.api.http) = {
      post: "/api/v1/bom-sessions"
      body: "*"
    };
  }

  rpc GetSession(GetSessionRequest) returns (GetSessionReply) {
    option (google.api.http) = {
      get: "/api/v1/bom-sessions/{session_id}"
    };
  }

  // 会话列表（分页、筛选）
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsReply) {
    option (google.api.http) = {
      get: "/api/v1/bom-sessions"
    };
  }

  // 更新会话头信息（标题、客户联系方式等）
  rpc PatchSession(PatchSessionRequest) returns (GetSessionReply) {
    option (google.api.http) = {
      patch: "/api/v1/bom-sessions/{session_id}"
      body: "*"
    };
  }

  rpc PutPlatforms(PutPlatformsRequest) returns (PutPlatformsReply) {
    option (google.api.http) = {
      put: "/api/v1/bom-sessions/{session_id}/platforms"
      body: "*"
    };
  }

  rpc GetReadiness(GetReadinessRequest) returns (GetReadinessReply) {
    option (google.api.http) = {
      get: "/api/v1/bom-sessions/{session_id}/readiness"
    };
  }

  rpc GetBOMLines(GetBOMLinesRequest) returns (GetBOMLinesReply) {
    option (google.api.http) = {
      get: "/api/v1/bom-sessions/{session_id}/lines"
    };
  }

  // 只读：检查当前行×勾选平台 与 bom_search_task 是否对齐（不写入）
  rpc GetSessionSearchTaskCoverage(GetSessionSearchTaskCoverageRequest) returns (GetSessionSearchTaskCoverageReply) {
    option (google.api.http) = {
      get: "/api/v1/bom-sessions/{session_id}/search-tasks/coverage"
    };
  }

  // 追加一行
  rpc CreateSessionLine(CreateSessionLineRequest) returns (CreateSessionLineReply) {
    option (google.api.http) = {
      post: "/api/v1/bom-sessions/{session_id}/lines"
      body: "*"
    };
  }

  // 更新一行
  rpc PatchSessionLine(PatchSessionLineRequest) returns (PatchSessionLineReply) {
    option (google.api.http) = {
      patch: "/api/v1/bom-sessions/{session_id}/lines/{line_id}"
      body: "*"
    };
  }

  // 删除一行
  rpc DeleteSessionLine(DeleteSessionLineRequest) returns (DeleteSessionLineReply) {
    option (google.api.http) = {
      delete: "/api/v1/bom-sessions/{session_id}/lines/{line_id}"
    };
  }

  rpc RetrySearchTasks(RetrySearchTasksRequest) returns (RetrySearchTasksReply) {
    option (google.api.http) = {
      post: "/api/v1/bom-sessions/{session_id}/search-tasks/retry"
      body: "*"
    };
  }

  // Agent 回写单行搜索任务结果（写 bom_search_task + bom_quote_cache）
  rpc SubmitBomSearchResult(SubmitBomSearchResultRequest) returns (SubmitBomSearchResultReply) {
    option (google.api.http) = {
      post: "/api/v1/bom-sessions/{session_id}/search-results"
      body: "*"
    };
  }

  // 导出会话 BOM 行（Excel/CSV）
  rpc ExportSession(ExportSessionRequest) returns (ExportSessionReply) {
    option (google.api.http) = {
      get: "/api/v1/bom-sessions/{session_id}/export"
    };
  }

  // 审核通过：将报价侧厂牌别名写入 t_bom_manufacturer_alias（alias_norm 由服务端按配单规则规范化）
  rpc CreateManufacturerAlias(CreateManufacturerAliasRequest) returns (CreateManufacturerAliasReply) {
    option (google.api.http) = {
      post: "/api/v1/bom/manufacturer-alias"
      body: "*"
    };
  }

  // 列举已有规范厂牌（distinct canonical_id），供审核时对照/选择
  rpc ListManufacturerCanonicals(ListManufacturerCanonicalsRequest) returns (ListManufacturerCanonicalsReply) {
    option (google.api.http) = {
      get: "/api/v1/bom/manufacturer-alias/canonicals"
    };
  }
}

// ========== UploadBOM ==========
message UploadBOMRequest {
  bytes file = 1;           // Excel 文件内容
  string filename = 2;      // 文件名
  string parse_mode = 3;   // 解析模式：szlcsc | ickey | auto | custom | llm（需配置 openai.api_key）
  map<string, string> column_mapping = 4;  // 自定义模式：{"model":"A","manufacturer":"B",...}
  // 若填写，则解析结果写入 bom_session_line，且返回的 bom_id 等于该 session_id（与 CreateSession 一致）
  string session_id = 5;
}

message UploadBOMReply {
  string bom_id = 1;
  repeated ParsedItem items = 2;
  int32 total = 3;
}

message ParsedItem {
  int32 index = 1;
  string raw = 2;
  string model = 3;
  string manufacturer = 4;
  string package = 5;
  int32 quantity = 6;
  string params = 7;
}

// ========== SearchQuotes ==========
message SearchQuotesRequest {
  string bom_id = 1;
  repeated string platforms = 2;
}

message SearchQuotesReply {
  repeated ItemQuotes item_quotes = 1;
}

message ItemQuotes {
  string model = 1;
  int32 quantity = 2;
  repeated PlatformQuote quotes = 3;
}

message PlatformQuote {
  string platform = 1;
  string matched_model = 2;
  string manufacturer = 3;
  string description = 4;
  int64 stock = 5;
  string lead_time = 6;
  int32 moq = 7;
  int32 increment = 8;
  string price_tiers = 9;
  string hk_price = 10;
  string mainland_price = 11;
  // SearchQuotes 等列表里常为 0；原价见 price_tiers / mainland_price / hk_price。AutoMatch/GetMatchResult 中若已换算则为基准币单价。
  double unit_price = 12;
  double subtotal = 13;
  string package = 14;      // 封装，用于型号/封装/厂牌匹配筛选
}

// ========== AutoMatch ==========
message AutoMatchRequest {
  string bom_id = 1;
  string strategy = 2;  // price_first | stock_first | leadtime_first | comprehensive
}

message AutoMatchReply {
  repeated MatchItem items = 1;
  // 与 items 中 unit_price/subtotal 同币种：配置项 bom_match.base_ccy（默认 CNY）。
  double total_amount = 2;
}

message MatchItem {
  int32 index = 1;
  string model = 2;
  int32 quantity = 3;
  string matched_model = 4;
  string manufacturer = 5;   // 匹配到的厂牌
  string platform = 6;
  string lead_time = 7;
  int64 stock = 8;
  // 已按汇率换算后的**基准币种**单价（非报价原币）；基准币见 bom_match.base_ccy。
  double unit_price = 9;
  // unit_price * quantity，同为基准币。
  double subtotal = 10;
  string match_status = 11;  // exact | pending | no_match
  repeated PlatformQuote all_quotes = 12;  // 该物料在各平台的全部报价，供「显示更多」展开展示
  string demand_manufacturer = 13;  // 需求厂牌（解析自 BOM）
  string demand_package = 14;       // 需求封装（解析自 BOM）
  // BOM 有厂牌要求时：型号+封装已对齐但厂牌未与需求对齐的报价原始 manufacturer（去重；空厂牌记为占位符便于列表展示）
  repeated string mfr_mismatch_quote_manufacturers = 15;
}

// ========== GetBOM ==========
message GetBOMRequest {
  string bom_id = 1;
}

message GetBOMReply {
  string bom_id = 1;
  string created_at = 2;
  repeated ParsedItem items = 3;
}

// ========== GetMatchResult ==========
message GetMatchResultRequest {
  string bom_id = 1;
}

message GetMatchResultReply {
  repeated MatchItem items = 1;
  double total_amount = 2;
}

// ========== 配单数据源（报价缓存）==========
message ListMatchSourceRecordsRequest {
  string bom_id = 1;
}

message MatchSourcePlatformEntry {
  string platform = 1;
  bool cache_hit = 2;
  // 未参与 usable 报价时的原因：quote_cache_miss / outcome_* / quotes_json_empty 等；可参与则为空
  string skip_reason = 3;
  string outcome = 4;
  int64 quotes_json_size = 5;
}

message MatchSourceLineRecord {
  int32 line_no = 1;
  string mpn = 2;
  string merge_mpn = 3;
  int32 quantity = 4;
  string demand_manufacturer = 5;
  string demand_package = 6;
  repeated MatchSourcePlatformEntry platforms = 7;
}

message ListMatchSourceRecordsReply {
  string biz_date = 1;
  repeated string session_platforms = 2;
  repeated MatchSourceLineRecord lines = 3;
}

message GetMatchSourceDetailRequest {
  string bom_id = 1;
  int32 line_no = 2;
  string platform = 3;
}

// 与 biz.ExplainQuoteRowsForBOMLine 一致：每条报价相对当前 BOM 行的型号/封装/厂牌说明（不含出价）。
message QuoteRowMatchEval {
  int32 row_index = 1;
  bool model_ok = 2;
  string model_reason = 3;
  bool package_ok = 4;
  string package_reason = 5;
  bool manufacturer_ok = 6;
  string manufacturer_reason = 7;
  bool passes_bom_filters = 8;
  string summary = 9;
}

message GetMatchSourceDetailReply {
  string merge_mpn = 1;
  string platform = 2;
  bool cache_hit = 3;
  string skip_reason = 4;
  string outcome = 5;
  string quotes_json = 6;
  string no_mpn_detail = 7;
  repeated QuoteRowMatchEval quote_row_evals = 8;
  // 当前 BOM 行需求（用于与表格对照；匹配判定与 quote_row_evals 一致）
  string bom_demand_mpn = 9;
  string bom_demand_package = 10;
  string bom_demand_manufacturer = 11;
}

// ========== Manufacturer alias（审核入库）==========
message CreateManufacturerAliasRequest {
  string alias = 1;           // 报价中出现的厂牌原文
  string canonical_id = 2;    // 目标规范 ID，如 MFR_TEXAS_INSTRUMENTS
  string display_name = 3;    // 规范展示名（与 canonical 主档一致即可）
}

message CreateManufacturerAliasReply {
  string alias_norm = 1;      // 实际写入的规范化键
}

message ListManufacturerCanonicalsRequest {
  int32 limit = 1; // 默认 300，最大 1000
}

message ManufacturerCanonicalRow {
  string canonical_id = 1;
  string display_name = 2;
}

message ListManufacturerCanonicalsReply {
  repeated ManufacturerCanonicalRow rows = 1;
}

// ========== DownloadTemplate ==========
message DownloadTemplateRequest {}

message DownloadTemplateReply {
  bytes file = 1;
  string filename = 2;
}

// ---------- Session ----------
message CreateSessionRequest {
  string title = 1;
  repeated string platform_ids = 2;
  string customer_name = 3;
  string contact_phone = 4;
  string contact_email = 5;
  string contact_extra = 6;
  // 数据就绪判定：lenient=各平台终态即可；strict=每行至少一平台 succeeded（见设计 §2.3）
  optional string readiness_mode = 7;
}

message CreateSessionReply {
  string session_id = 1;
  string biz_date = 2;             // YYYY-MM-DD
  int32 selection_revision = 3;
}

message GetSessionRequest {
  string session_id = 1;
}

message GetSessionReply {
  string session_id = 1;
  string title = 2;
  string status = 3;
  string biz_date = 4;
  int32 selection_revision = 5;
  repeated string platform_ids = 6;
  string customer_name = 7;
  string contact_phone = 8;
  string contact_email = 9;
  string contact_extra = 10;
  string readiness_mode = 11;
}

message ListSessionsRequest {
  int32 page = 1;
  int32 page_size = 2;
  string status = 3;
  string biz_date = 4;
  string q = 5;
}

message SessionListItem {
  string session_id = 1;
  string title = 2;
  string customer_name = 3;
  string status = 4;
  string biz_date = 5;
  string updated_at = 6;
  int32 line_count = 7;
}

message ListSessionsReply {
  repeated SessionListItem items = 1;
  int32 total = 2;
}

message PatchSessionRequest {
  string session_id = 1;
  optional string title = 2;
  optional string customer_name = 3;
  optional string contact_phone = 4;
  optional string contact_email = 5;
  optional string contact_extra = 6;
  optional string readiness_mode = 7;
}

message PutPlatformsRequest {
  string session_id = 1;
  repeated string platform_ids = 2;
  int32 expected_revision = 3;
}

message PutPlatformsReply {
  int32 selection_revision = 1;
}

message GetReadinessRequest {
  string session_id = 1;
}

message GetReadinessReply {
  string session_id = 1;
  string biz_date = 2;
  int32 selection_revision = 3;
  string phase = 4;
  bool can_enter_match = 5;
  string block_reason = 6;
}

message GetBOMLinesRequest {
  string session_id = 1;
}

message BOMLineRow {
  string line_id = 1;
  int32 line_no = 2;
  string mpn = 3;
  string mfr = 4;
  string package = 5;
  double qty = 6;
  string match_status = 7;
  repeated PlatformGap platform_gaps = 8;
}

message PlatformGap {
  string platform_id = 1;
  string phase = 2;
  string reason_code = 3;
  string message = 4;
  int32 auto_attempt = 5;
  int32 manual_attempt = 6;
  // 四态：pending | searching | succeeded | failed | missing（缺任务行）
  string search_ui_state = 7;
}

message GetSessionSearchTaskCoverageRequest {
  string session_id = 1;
}

message SearchTaskMissingItem {
  string line_id = 1;
  int32 line_no = 2;
  string mpn_norm = 3;
  string platform_id = 4;
  string reason = 5;
}

message GetSessionSearchTaskCoverageReply {
  bool consistent = 1;
  int32 orphan_task_count = 2;
  int32 expected_task_count = 3;
  int32 existing_task_count = 4;
  repeated SearchTaskMissingItem missing_tasks = 5;
}

message GetBOMLinesReply {
  repeated BOMLineRow lines = 1;
}

message CreateSessionLineRequest {
  string session_id = 1;
  string mpn = 2;
  string mfr = 3;
  string package = 4;
  double qty = 5;
  string raw = 6;
  string extra_json = 7;
}

message CreateSessionLineReply {
  string line_id = 1;
  int32 line_no = 2;
}

message PatchSessionLineRequest {
  string session_id = 1;
  string line_id = 2;
  optional string mpn = 3;
  optional string mfr = 4;
  optional string package = 5;
  optional double qty = 6;
  optional string raw = 7;
  optional string extra_json = 8;
}

message PatchSessionLineReply {
  string line_id = 1;
  int32 line_no = 2;
}

message DeleteSessionLineRequest {
  string session_id = 1;
  string line_id = 2;
}

message DeleteSessionLineReply {}

message RetrySearchTasksRequest {
  string session_id = 1;
  repeated RetrySearchItem items = 2;
}

message RetrySearchItem {
  string mpn = 1;
  string platform_id = 2;
}

message RetrySearchTasksReply {
  int32 accepted = 1;
}

message SubmitBomSearchResultRequest {
  string session_id = 1;
  string mpn_norm = 2;
  string platform_id = 3;
  string caichip_task_id = 4;
  // succeeded_quotes | succeeded_no_mpn | failed
  string status = 5;
  string error_message = 6;
  string quotes_json = 7;
  string no_mpn_detail_json = 8;
}

message SubmitBomSearchResultReply {
  bool accepted = 1;
  string server_time = 2;
}

// ---------- Export ----------
message ExportSessionRequest {
  string session_id = 1;
  // xlsx | csv，缺省 xlsx
  string format = 2;
}

message ExportSessionReply {
  bytes file = 1;
  string filename = 2;
}
