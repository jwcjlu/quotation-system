syntax = "proto3";

package api.bom.v1;

import "google/api/annotations.proto";

option go_package = "caichip/api/bom/v1;v1";

// BOM 配单服务
service BomService {
  // 上传并解析 BOM
  rpc UploadBOM(UploadBOMRequest) returns (UploadBOMReply) {
    option (google.api.http) = {
      post: "/api/v1/bom/upload"
      body: "*"
    };
  }

  // 多平台搜索报价
  rpc SearchQuotes(SearchQuotesRequest) returns (SearchQuotesReply) {
    option (google.api.http) = {
      post: "/api/v1/bom/search"
      body: "*"
    };
  }

  // 自动配单
  rpc AutoMatch(AutoMatchRequest) returns (AutoMatchReply) {
    option (google.api.http) = {
      post: "/api/v1/bom/match"
      body: "*"
    };
  }

  // 下载 BOM 模板
  rpc DownloadTemplate(DownloadTemplateRequest) returns (DownloadTemplateReply) {
    option (google.api.http) = {
      get: "/api/v1/bom/template"
    };
  }

  // 厂牌别名：规范 ID 下拉数据 + 写入 t_bom_manufacturer_alias（配单页「厂牌别名审核」）
  rpc ListManufacturerCanonicals(ListManufacturerCanonicalsRequest) returns (ListManufacturerCanonicalsReply) {
    option (google.api.http) = {
      get: "/api/v1/bom/manufacturer-canonicals"
    };
  }

  rpc CreateManufacturerAlias(CreateManufacturerAliasRequest) returns (CreateManufacturerAliasReply) {
    option (google.api.http) = {
      post: "/api/v1/bom/manufacturer-aliases"
      body: "*"
    };
  }

  // 厂牌两阶段清洗 — 阶段一：需求行候选 + 审批（仅回填 session_line）
  rpc ListSessionLineMfrCandidates(ListSessionLineMfrCandidatesRequest) returns (ListSessionLineMfrCandidatesReply) {
    option (google.api.http) = {
      get: "/api/v1/bom-sessions/{session_id}/session-line-mfr-candidates"
    };
  }

  rpc ApproveSessionLineMfrCleaning(ApproveSessionLineMfrCleaningRequest) returns (ApproveSessionLineMfrCleaningReply) {
    option (google.api.http) = {
      post: "/api/v1/bom-sessions/{session_id}/session-line-mfr-approvals"
      body: "*"
    };
  }

  // 厂牌两阶段清洗 — 阶段二：报价明细评审列表（与 GetReadiness.include_quote_item_mfr_reviews 同源；保留独立 GET 供旧客户端）
  rpc ListQuoteItemMfrReviews(ListQuoteItemMfrReviewsRequest) returns (ListQuoteItemMfrReviewsReply) {
    option (google.api.http) = {
      get: "/api/v1/bom-sessions/{session_id}/quote-item-mfr-reviews"
    };
  }

  rpc SubmitQuoteItemMfrReview(SubmitQuoteItemMfrReviewRequest) returns (SubmitQuoteItemMfrReviewReply) {
    option (google.api.http) = {
      post: "/api/v1/bom-sessions/{session_id}/quote-item-mfr-reviews"
      body: "*"
    };
  }

  rpc ApplyKnownManufacturerAliasesToSession(ApplyKnownManufacturerAliasesToSessionRequest) returns (ApplyKnownManufacturerAliasesToSessionReply) {
    option (google.api.http) = {
      post: "/api/v1/bom-sessions/{session_id}/manufacturer-aliases/apply"
      body: "*"
    };
  }

  // 获取 BOM 详情（含解析结果）
  rpc GetBOM(GetBOMRequest) returns (GetBOMReply) {
    option (google.api.http) = {
      get: "/api/v1/bom/{bom_id}"
    };
  }

  // 获取配单结果
  rpc GetMatchResult(GetMatchResultRequest) returns (GetMatchResultReply) {
    option (google.api.http) = {
      get: "/api/v1/bom/{bom_id}/match"
    };
  }

  // 配单诊断：各行 × 会话勾选平台的报价缓存命中与跳过原因（不要求 BOM_NOT_READY）
  rpc ListMatchSources(ListMatchSourcesRequest) returns (ListMatchSourcesReply) {
    option (google.api.http) = {
      get: "/api/v1/bom/{bom_id}/match-sources"
    };
  }

  // 单行单平台：原始 quotes_json / no_mpn_detail（与 web/src/api/bomMatchExtras.ts 对齐）
  rpc GetMatchSourceDetail(GetMatchSourceDetailRequest) returns (GetMatchSourceDetailReply) {
    option (google.api.http) = {
      get: "/api/v1/bom/{bom_id}/match-sources/{line_no}/{platform}"
    };
  }

  // 单行：t_bom_session_line 原始需求 + 经 t_bom_quote_cache 关联的 t_bom_quote_item 全表明细（运营审查）
  rpc GetBomLineQuoteItems(GetBomLineQuoteItemsRequest) returns (GetBomLineQuoteItemsReply) {
    option (google.api.http) = {
      get: "/api/v1/bom/{bom_id}/lines/{line_no}/quote-items"
    };
  }
  // ---------- BOM 会话（货源搜索 / 轮询就绪，见 docs/BOM货源搜索-接口清单.md）----------

  rpc CreateSession(CreateSessionRequest) returns (CreateSessionReply) {
    option (google.api.http) = {
      post: "/api/v1/bom-sessions"
      body: "*"
    };
  }

  rpc GetSession(GetSessionRequest) returns (GetSessionReply) {
    option (google.api.http) = {
      get: "/api/v1/bom-sessions/{session_id}"
    };
  }

  // 会话列表（分页、筛选）
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsReply) {
    option (google.api.http) = {
      get: "/api/v1/bom-sessions"
    };
  }

  // 更新会话头信息（标题、客户联系方式等）
  rpc PatchSession(PatchSessionRequest) returns (GetSessionReply) {
    option (google.api.http) = {
      patch: "/api/v1/bom-sessions/{session_id}"
      body: "*"
    };
  }

  rpc PutPlatforms(PutPlatformsRequest) returns (PutPlatformsReply) {
    option (google.api.http) = {
      put: "/api/v1/bom-sessions/{session_id}/platforms"
      body: "*"
    };
  }

  rpc GetReadiness(GetReadinessRequest) returns (GetReadinessReply) {
    option (google.api.http) = {
      get: "/api/v1/bom-sessions/{session_id}/readiness"
    };
  }

  rpc GetBOMLines(GetBOMLinesRequest) returns (GetBOMLinesReply) {
    option (google.api.http) = {
      get: "/api/v1/bom-sessions/{session_id}/lines"
    };
  }

  // 只读：检查当前行×勾选平台 与 bom_search_task 是否对齐（不写入）
  rpc GetSessionSearchTaskCoverage(GetSessionSearchTaskCoverageRequest) returns (GetSessionSearchTaskCoverageReply) {
    option (google.api.http) = {
      get: "/api/v1/bom-sessions/{session_id}/search-tasks/coverage"
    };
  }

  rpc ListSessionSearchTasks(ListSessionSearchTasksRequest) returns (ListSessionSearchTasksReply) {
    option (google.api.http) = {
      get: "/api/v1/bom-sessions/{session_id}/search-tasks"
    };
  }

  // 追加一行
  rpc CreateSessionLine(CreateSessionLineRequest) returns (CreateSessionLineReply) {
    option (google.api.http) = {
      post: "/api/v1/bom-sessions/{session_id}/lines"
      body: "*"
    };
  }

  // 更新一行
  rpc PatchSessionLine(PatchSessionLineRequest) returns (PatchSessionLineReply) {
    option (google.api.http) = {
      patch: "/api/v1/bom-sessions/{session_id}/lines/{line_id}"
      body: "*"
    };
  }

  // 删除一行
  rpc DeleteSessionLine(DeleteSessionLineRequest) returns (DeleteSessionLineReply) {
    option (google.api.http) = {
      delete: "/api/v1/bom-sessions/{session_id}/lines/{line_id}"
    };
  }

  rpc RetrySearchTasks(RetrySearchTasksRequest) returns (RetrySearchTasksReply) {
    option (google.api.http) = {
      post: "/api/v1/bom-sessions/{session_id}/search-tasks/retry"
      body: "*"
    };
  }

  // Agent 回写单行搜索任务结果（写 bom_search_task + bom_quote_cache）
  rpc SubmitBomSearchResult(SubmitBomSearchResultRequest) returns (SubmitBomSearchResultReply) {
    option (google.api.http) = {
      post: "/api/v1/bom-sessions/{session_id}/search-results"
      body: "*"
    };
  }

  // 导出会话 BOM 行（Excel/CSV），见 docs/BOM货源搜索-接口清单.md §7
  rpc ListLineGaps(ListLineGapsRequest) returns (ListLineGapsReply) {
    option (google.api.http) = {
      get: "/api/bom/sessions/{session_id}/gaps"
    };
  }

  rpc ResolveLineGapManualQuote(ResolveLineGapManualQuoteRequest) returns (ResolveLineGapManualQuoteReply) {
    option (google.api.http) = {
      post: "/api/bom/gaps/{gap_id}/manual-quote"
      body: "*"
    };
  }

  rpc SelectLineGapSubstitute(SelectLineGapSubstituteRequest) returns (SelectLineGapSubstituteReply) {
    option (google.api.http) = {
      post: "/api/bom/gaps/{gap_id}/substitute"
      body: "*"
    };
  }

  rpc SaveMatchRun(SaveMatchRunRequest) returns (SaveMatchRunReply) {
    option (google.api.http) = {
      post: "/api/bom/sessions/{session_id}/match-runs"
      body: "*"
    };
  }

  rpc ListMatchRuns(ListMatchRunsRequest) returns (ListMatchRunsReply) {
    option (google.api.http) = {
      get: "/api/bom/sessions/{session_id}/match-runs"
    };
  }

  rpc GetMatchRun(GetMatchRunRequest) returns (GetMatchRunReply) {
    option (google.api.http) = {
      get: "/api/bom/match-runs/{run_id}"
    };
  }

  rpc ExportSession(ExportSessionRequest) returns (ExportSessionReply) {
    option (google.api.http) = {
      get: "/api/v1/bom-sessions/{session_id}/export"
    };
  }
}

// HS 型号解析服务
service HsResolveService {
  // 按型号触发解析；在同步超时内完成则直接返回，否则返回 task_id 供轮询
  rpc ResolveByModel(HsResolveByModelRequest) returns (HsResolveByModelReply) {
    option (google.api.http) = {
      post: "/api/hs/resolve/by-model"
      body: "*"
    };
  }

  // 查询单个任务状态与结果
  rpc GetResolveTask(HsResolveTaskRequest) returns (HsResolveTaskReply) {
    option (google.api.http) = {
      get: "/api/hs/resolve/task"
    };
  }

  // 人工确认候选
  rpc ConfirmResolve(HsResolveConfirmRequest) returns (HsResolveConfirmReply) {
    option (google.api.http) = {
      post: "/api/hs/resolve/confirm"
      body: "*"
    };
  }

  // 查询历史结果与候选
  rpc GetResolveHistory(HsResolveHistoryRequest) returns (HsResolveHistoryReply) {
    option (google.api.http) = {
      get: "/api/hs/resolve/history"
    };
  }

  // 批量触发解析（仅处理“已匹配且无 HS”行）
  rpc BatchResolveByModels(HsBatchResolveByModelsRequest) returns (HsBatchResolveByModelsReply) {
    option (google.api.http) = {
      post: "/api/hs/resolve/by-models:batch"
      body: "*"
    };
  }

  // 分页查询待人工确认项
  rpc ListPendingReviews(HsPendingReviewsRequest) returns (HsPendingReviewsReply) {
    option (google.api.http) = {
      get: "/api/hs/resolve/pending-reviews"
    };
  }

  // 上传手册 PDF（二进制走 file；HTTP 亦可 multipart，由服务端自定义路由绑定）
  rpc UploadHsManualDatasheet(UploadHsManualDatasheetRequest) returns (UploadHsManualDatasheetReply) {}
}

// ========== UploadBOM ==========
message UploadBOMRequest {
  bytes file = 1;           // Excel 文件内容
  string filename = 2;      // 文件名
  string parse_mode = 3;   // 解析模式：szlcsc | ickey | auto | custom
  map<string, string> column_mapping = 4;  // 自定义模式：{"model":"A","manufacturer":"B",...}
  // 若填写，则解析结果写入 bom_session_line，且返回的 bom_id 等于该 session_id（与 CreateSession 一致）
  string session_id = 5;
}

message UploadBOMReply {
  string bom_id = 1;
  repeated ParsedItem items = 2;
  int32 total = 3;
  bool accepted = 4;
  string import_status = 5;
  string import_message = 6;
}

message ParsedItem {
  int32 index = 1;
  string raw = 2;
  string model = 3;
  string manufacturer = 4;
  string package = 5;
  int32 quantity = 6;
  string params = 7;
  string unified_model = 8;
  string reference_designator = 9;
  string substitute_model = 10;
  string remark = 11;
  string description = 12;
}

// ========== SearchQuotes ==========
message SearchQuotesRequest {
  string bom_id = 1;
  repeated string platforms = 2;
}

message SearchQuotesReply {
  repeated ItemQuotes item_quotes = 1;
}

message ItemQuotes {
  string model = 1;
  int32 quantity = 2;
  repeated PlatformQuote quotes = 3;
}

message PlatformQuote {
  string platform = 1;
  string matched_model = 2;
  string manufacturer = 3;
  string description = 4;
  int64 stock = 5;
  string lead_time = 6;
  int32 moq = 7;
  int32 increment = 8;
  string price_tiers = 9;
  string hk_price = 10;
  string mainland_price = 11;
  double unit_price = 12;
  double subtotal = 13;
  string package = 14;      // 封装，用于型号/封装/厂牌匹配筛选
}

// ========== AutoMatch ==========
message AutoMatchRequest {
  string bom_id = 1;
  string strategy = 2;  // price_first | stock_first | leadtime_first | comprehensive
}

message AutoMatchReply {
  repeated MatchItem items = 1;
  double total_amount = 2;
}

message MatchItem {
  int32 index = 1;
  string model = 2;
  int32 quantity = 3;
  string matched_model = 4;
  string manufacturer = 5;   // 匹配到的厂牌
  string platform = 6;
  string lead_time = 7;
  int64 stock = 8;
  double unit_price = 9;
  double subtotal = 10;
  string match_status = 11;  // exact | pending | no_match
  repeated PlatformQuote all_quotes = 12;  // 该物料在各平台的全部报价，供「显示更多」展开展示
  string demand_manufacturer = 13;  // 需求厂牌（解析自 BOM）
  string demand_package = 14;       // 需求封装（解析自 BOM）
  // ---------- HS / 商检 / 进口关税（见 docs/superpowers/specs/2026-04-19-bom-line-hs-customs-tax-design.md）----------
  string hs_code_status = 15;  // hs_found | hs_not_mapped | hs_code_invalid
  string code_ts = 16;
  string control_mark = 17;
  string import_tax_g_name = 18;
  string import_tax_imp_ordinary_rate = 19;
  string import_tax_imp_discount_rate = 20;
  string import_tax_imp_temp_rate = 21;
  // hs_customs_error：分号拼接分项码，如 tax_api_failed;hs_item_missing
  string hs_customs_error = 22;
  // original | substitute
  string matched_by = 23;
  // 实际命中的查询型号（客户原型号或替代型号）
  string matched_query_mpn = 24;
}

// ========== GetBOM ==========
message GetBOMRequest {
  string bom_id = 1;
}

message GetBOMReply {
  string bom_id = 1;
  string created_at = 2;
  repeated ParsedItem items = 3;
}

// ========== GetMatchResult ==========
message GetMatchResultRequest {
  string bom_id = 1;
}

message GetMatchResultReply {
  repeated MatchItem items = 1;
  double total_amount = 2;
}

// ========== Match sources（报价缓存诊断）==========
message ListMatchSourcesRequest {
  string bom_id = 1;
}

message MatchSourcePlatformRow {
  string platform = 1;
  bool cache_hit = 2;
  string skip_reason = 3;
  string outcome = 4;
  int32 quotes_json_size = 5;
}

message MatchSourceLineRow {
  int32 line_no = 1;
  string mpn = 2;
  string merge_mpn = 3;
  int32 quantity = 4;
  string demand_manufacturer = 5;
  string demand_package = 6;
  repeated MatchSourcePlatformRow platforms = 7;
}

message ListMatchSourcesReply {
  string biz_date = 1;
  repeated string session_platforms = 2;
  repeated MatchSourceLineRow lines = 3;
}

message QuoteRowMatchEval {
  int32 row_index = 1;
  bool manufacturer_ok = 2;
  bool passes_bom_filters = 3;
  string summary = 4;
  string model_reason = 5;
  string package_reason = 6;
  string manufacturer_reason = 7;
}

message GetMatchSourceDetailRequest {
  string bom_id = 1;
  int32 line_no = 2;
  string platform = 3;
}

message GetMatchSourceDetailReply {
  string merge_mpn = 1;
  string platform = 2;
  bool cache_hit = 3;
  string skip_reason = 4;
  string outcome = 5;
  string no_mpn_detail = 6;
  string quotes_json = 7;
  repeated QuoteRowMatchEval quote_row_evals = 8;
  string bom_demand_mpn = 9;
  string bom_demand_package = 10;
  string bom_demand_manufacturer = 11;
}

message GetBomLineQuoteItemsRequest {
  string bom_id = 1;
  int32 line_no = 2;
}

message BomLineDemandSnapshot {
  int32 line_no = 1;
  int64 line_db_id = 2;
  string raw_text = 3;
  string mpn = 4;
  string unified_mpn = 5;
  string reference_designator = 6;
  string substitute_mpn = 7;
  string remark = 8;
  string description = 9;
  string demand_manufacturer = 10;
  string manufacturer_canonical_id = 11;
  string demand_package = 12;
  double quantity = 13;
  string extra_json = 14;
}

message BomQuoteItemRead {
  string platform = 1;
  uint64 quote_id = 2;
  uint64 item_id = 3;
  string model = 4;
  string manufacturer = 5;
  string manufacturer_canonical_id = 6;
  string package = 7;
  string stock = 8;
  string desc = 9;
  string moq = 10;
  string lead_time = 11;
  string price_tiers = 12;
  string hk_price = 13;
  string mainland_price = 14;
  string query_model = 15;
  string datasheet_url = 16;
  string source_type = 17;
  string session_id = 18;
  int64 line_id = 19;
}

message GetBomLineQuoteItemsReply {
  string biz_date = 1;
  string merge_mpn = 2;
  BomLineDemandSnapshot demand = 3;
  repeated BomQuoteItemRead items = 4;
}

// ========== 厂牌别名 ==========
message ListManufacturerCanonicalsRequest {
  int32 limit = 1;
}

message BomManufacturerCanonicalRow {
  string canonical_id = 1;
  string display_name = 2;
}

message ListManufacturerCanonicalsReply {
  repeated BomManufacturerCanonicalRow items = 1;
}

message CreateManufacturerAliasRequest {
  string alias = 1;
  string canonical_id = 2;
  string display_name = 3;
}

message CreateManufacturerAliasReply {}

message ListSessionLineMfrCandidatesRequest {
  string session_id = 1;
}

message ListSessionLineMfrCandidatesReply {
  repeated SessionLineMfrCandidateRow items = 1;
}

message SessionLineMfrCandidateRow {
  int32 line_no = 1;
  string mfr = 2;
  string recommended_canonical_id = 3;
}

message ApproveSessionLineMfrCleaningRequest {
  string session_id = 1;
  string alias = 2;
  string canonical_id = 3;
  string display_name = 4;
}

message ApproveSessionLineMfrCleaningReply {
  int32 session_line_updated = 1;
  int32 quote_item_updated = 2;
}

message ListQuoteItemMfrReviewsRequest {
  string session_id = 1;
  // 为 true 时返回全部仍待阶段二人工确认的报价子行；为 false（默认）时仅返回各行 TopK∪TopN 优先队列内、且仍须确认的报价（依赖 match 就绪；未就绪时与 true 行为一致返回全量）。
  bool include_all_pending_quote_mfr = 2;
}

message ListQuoteItemMfrReviewsReply {
  bool gate_open = 1;
  repeated QuoteItemMfrReviewRow items = 2;
  // 未按优先子集过滤前的待审报价子行总数（默认过滤时用于前端「展示 x / y」；include_all_pending_quote_mfr=true 时与 items 长度一致）。
  int32 all_pending_quote_mfr_count = 3;
}

message QuoteItemMfrReviewRow {
  uint64 quote_item_id = 1;
  int32 line_no = 2;
  string line_manufacturer_canonical_id = 3;
  string manufacturer = 4;
  string platform_id = 5;
}

message SubmitQuoteItemMfrReviewRequest {
  string session_id = 1;
  uint64 quote_item_id = 2;
  string decision = 3;
  string reason = 4;
  string manufacturer_canonical_id = 5;
}

message SubmitQuoteItemMfrReviewReply {}

message ApplyKnownManufacturerAliasesToSessionRequest {
  string session_id = 1;
}

message ApplyKnownManufacturerAliasesToSessionReply {
  int32 session_line_updated = 1;
  int32 quote_item_updated = 2;
}

// ========== DownloadTemplate ==========
message DownloadTemplateRequest {}

message DownloadTemplateReply {
  bytes file = 1;
  string filename = 2;
}

// ---------- Session ----------
message CreateSessionRequest {
  string title = 1;
  repeated string platform_ids = 2;
  string customer_name = 3;
  string contact_phone = 4;
  string contact_email = 5;
  string contact_extra = 6;
}

message CreateSessionReply {
  string session_id = 1;
  string biz_date = 2;             // YYYY-MM-DD
  int32 selection_revision = 3;
}

message GetSessionRequest {
  string session_id = 1;
}

message GetSessionReply {
  string session_id = 1;
  string title = 2;
  string status = 3;
  string biz_date = 4;
  int32 selection_revision = 5;
  repeated string platform_ids = 6;
  string customer_name = 7;
  string contact_phone = 8;
  string contact_email = 9;
  string contact_extra = 10;
  string import_status = 11;
  int32 import_progress = 12;
  string import_stage = 13;
  string import_message = 14;
  string import_error_code = 15;
  string import_error = 16;
  string import_updated_at = 17;
}

message ListSessionsRequest {
  int32 page = 1;
  int32 page_size = 2;
  string status = 3;
  string biz_date = 4;
  string q = 5;
}

message SessionListItem {
  string session_id = 1;
  string title = 2;
  string customer_name = 3;
  string status = 4;
  string biz_date = 5;
  string updated_at = 6;
  int32 line_count = 7;
}

message ListSessionsReply {
  repeated SessionListItem items = 1;
  int32 total = 2;
}

message PatchSessionRequest {
  string session_id = 1;
  optional string title = 2;
  optional string customer_name = 3;
  optional string contact_phone = 4;
  optional string contact_email = 5;
  optional string contact_extra = 6;
}

message PutPlatformsRequest {
  string session_id = 1;
  repeated string platform_ids = 2;
  int32 expected_revision = 3;
}

message PutPlatformsReply {
  int32 selection_revision = 1;
}

message GetReadinessRequest {
  string session_id = 1;
  // 为 true 时在响应中一并返回阶段二报价厂牌待审列表（原 GET quote-item-mfr-reviews；与 ListQuoteItemMfrReviews 同源）。
  bool include_quote_item_mfr_reviews = 2;
  // 仅当 include_quote_item_mfr_reviews 时有效：为 true 返回全量待审子行，为 false（默认）仅返回各行 TopK∪TopN 内待审。
  bool include_all_pending_quote_mfr = 3;
}

message GetReadinessReply {
  string session_id = 1;
  string biz_date = 2;
  int32 selection_revision = 3;
  string phase = 4;
  bool can_enter_match = 5;
  string block_reason = 6;
  int32 line_total = 7;
  int32 ready_line_count = 8;
  int32 gap_line_count = 9;
  int32 no_data_line_count = 10;
  int32 collection_unavailable_line_count = 11;
  int32 no_match_after_filter_line_count = 12;
  int32 collecting_line_count = 13;
  bool has_strict_blocking_gap = 14;
  // 父行有需求厂牌时，报价子表处于 manufacturer_review_status=pending 的行数（跨平台合计）。
  int32 quote_mfr_review_pending_count = 15;
  // 规则 B：会话内需行中「未满足底价带厂牌全通过」的行数（与 SRS REQ-READY-004 一致；无法计算时 repeated 为空且本字段为 0）。
  int32 session_lines_quote_review_rule_b_not_ok_count = 16;
  // 当前默认 TopN（REQ-QUEUE-001 配置回声）。
  int32 session_quote_review_default_top_n = 17;
  // 每需求行规则 B 与候选池快照（REQ-READY-001）。
  repeated LineQuoteReviewReadiness line_quote_review_readiness = 18;
  // 以下字段仅当请求 include_quote_item_mfr_reviews 时填充（与 ListQuoteItemMfrReviewsReply 对齐）。
  bool quote_mfr_review_gate_open = 19;
  repeated QuoteItemMfrReviewRow quote_item_mfr_review_items = 20;
  int32 all_pending_quote_mfr_count = 21;
}

// 单条 t_bom_session_line（需求行）维度：TopK/TopN/规则 B 均在「该行 × 会话勾选平台」合并后的报价子行池上计算，不按平台分别取 Top。
message LineQuoteReviewReadiness {
  string line_id = 1;
  bool line_quote_review_rule_b_ok = 2;
  int32 line_quote_review_candidate_pool_m = 3;
  // 该行合并池内规则 B 底价带 TopK（t_bom_quote_item.id，跨平台）。
  repeated uint64 line_quote_review_top_k_item_ids = 4;
  // 该行合并池内默认优先审核 TopN（同上，跨平台可比价排序后截断）。
  repeated uint64 line_quote_review_top_n_item_ids = 5;
}

