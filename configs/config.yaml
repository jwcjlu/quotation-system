server:
  http:
    addr: 0.0.0.0:18080
    # Agent 长轮询建议 ≥120；若启用 agent.enabled，NewHTTPServer 会将过短超时抬升到 120s
    timeout: 120
  grpc:
    addr: 0.0.0.0:19090
    timeout: 10

data:
  database:
    # BOM 会话 / bom_session_line：先在本库执行 docs/schema/bom_mysql.sql
    driver: mysql
    dsn: viu_root:myviu_4359@tcp(172.26.50.161:23306)/bom_match?charset=utf8mb4
  redis:
    addr: 127.0.0.1:6379
    read_timeout: 1
    write_timeout: 1

# 分布式采集 Agent API（见 docs/分布式采集Agent-API协议.md）
agent:
  enabled: true
  api_keys:
    - "change-me-in-production"
  long_poll_max_sec: 55
  default_task_heartbeat_sec: 10
  offline_min_sec: 120
  offline_heartbeat_multiplier: 6
  # 开发调试用：POST /api/v1/agent/dev/enqueue 入队任务（生产务必 false）
  dev_enqueue_enabled: true
  # 任务队列：memory=内存（单机）；mysql=表 caichip_dispatch_task（多实例，须 MySQL8+ 且已执行 schema）
  dispatch_store: mysql
  # 租约 deadline = 任务 timeout_sec + 此处附加秒数
  dispatch_lease_extra_sec: 0

# Agent 脚本包分发（需 DB 表 docs/schema/agent_script_package_mysql.sql）
script_store:
  enabled: true
  root: "D://workspace/caichip/static/scripts"
  url_prefix: /static/agent-scripts
  public_base_url: "http://10.86.32.78:18080"
  max_upload_mb: 64

script_admin:
  api_keys:
    - "change-me-admin-key"

# BOM 搜索任务回传 POST /api/v1/bom-sessions/{id}/search-results（Header: X-API-Key 或 Authorization: Bearer）
bom_search_callback:
  api_keys:
    - "change-me-bom-search-callback"

platform:
  ickey:
    search_url: "https://search.ickey.cn/"
    timeout: 300
    crawler_path: "python"
    crawler_script: "ickey_crawler.py"
    work_dir: "D:\\workspace\\caichip"
