server:
  http:
    addr: 0.0.0.0:18080
    # Agent 长轮询建议 ≥120；若启用 agent.enabled，NewHTTPServer 会将过短超时抬升到 120s
    timeout: 120
  grpc:
    addr: 0.0.0.0:19090
    timeout: 10

data:
  database:
    # BOM 会话 / bom_session_line：先在本库执行 docs/schema/bom_mysql.sql
    driver: mysql
    dsn: viu_root:myviu_4359@tcp(172.26.50.161:23306)/bom_match?charset=utf8mb4
  redis:
    addr: 127.0.0.1:6379
    read_timeout: 1
    write_timeout: 1

# 分布式采集 Agent API（见 docs/分布式采集Agent-API协议.md）
agent:
  enabled: true
  api_keys:
    - "change-me-in-production"
  long_poll_max_sec: 55
  default_task_heartbeat_sec: 10
  offline_min_sec: 120
  offline_heartbeat_multiplier: 6
  # 开发调试用：POST /api/v1/agent/dev/enqueue 入队任务（生产务必 false）
  dev_enqueue_enabled: true

platform:
  ickey:
    search_url: "https://search.ickey.cn/"
    timeout: 300
    crawler_path: "python"
    crawler_script: "ickey_crawler.py"
    work_dir: "D:\\workspace\\caichip"
