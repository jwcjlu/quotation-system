version: "2.2"

services:
  mysql:
    image: mysql:8.0
    container_name: caichip-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: caichip
      TZ: Asia/Shanghai
    command:
      - --default-authentication-plugin=mysql_native_password
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -proot --silent"]
      interval: 10s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    container_name: caichip-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20

  server:
    build:
      context: .
      dockerfile: Dockerfile.server
      args:
        SERVER_BUILDER_IMAGE: ${SERVER_BUILDER_IMAGE:-golang:1.25.8-alpine}
        SERVER_RUNTIME_IMAGE: ${SERVER_RUNTIME_IMAGE:-alpine:3.20}
        GOPROXY: ${GOPROXY:-https://goproxy.cn,direct}
        GOSUMDB: ${GOSUMDB:-sum.golang.google.cn}
    container_name: caichip-server
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "18080:18080"
      - "19090:19090"
    volumes:
      - /app/configs:/app/configs:ro
      - /app/static/agent-scripts:/app/static/agent-scripts
      - /app/logs:/app/logs

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: caichip-web
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  mysql-data:
  redis-data:
