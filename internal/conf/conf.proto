syntax = "proto3";

package conf;

// 与 internal/conf/conf.go + configs/config.yaml 字段语义对齐（用于序列化/文档/跨语言约定，不等同于运行时 Wire 注入结构）。
option go_package = "caichip/conf;conf";

message Bootstrap {
  Server server = 1;
  Data data = 2;
  Platform platform = 3;
  Agent agent = 4;
  ScriptStore script_store = 5;
  ScriptAdmin script_admin = 6;
  // BOM 货源搜索任务回传（SubmitBomSearchResult），独立于 agent.api_keys
  BomSearchCallback bom_search_callback = 7;
  // Agent 运维查询 API（ListAgents / 租约任务 / 已装脚本），独立于 agent.api_keys
  AgentAdmin agent_admin = 8;
  // OpenAI：BOM Upload parse_mode=llm 时推断列映射（github.com/sashabaranov/go-openai）
  OpenAI openai = 9;
}

// OpenAI 聊天补全（api_key 为空时不创建客户端，llm 模式将报错提示配置）
message OpenAI {
  string api_key = 1;
  // 可选，兼容代理或 Azure OpenAI 风格网关；空则官方 https://api.openai.com/v1
  string base_url = 2;
  // 默认 gpt-4o-mini
  string model = 3;
}

message Server {
  ServerHTTP http = 1;
  ServerGRPC grpc = 2;
}

message ServerHTTP {
  string addr = 1;
  int32 timeout = 2; // seconds
}

message ServerGRPC {
  string addr = 1;
  int32 timeout = 2; // seconds
}

message Data {
  DataDatabase database = 1;
  DataRedis redis = 2;
}

message DataDatabase {
  string driver = 1;
  string dsn = 2;
  // 未设置或 true：连接成功后执行 GORM AutoMigrate（建表/补列/补简单索引）；显式 false 时跳过（生产可用手工 SQL）。
  optional bool auto_migrate = 3;
}

message DataRedis {
  string addr = 1;
  int32 read_timeout = 2;  // seconds
  int32 write_timeout = 3; // seconds
}

// Agent 分布式采集 Agent HTTP API（见 docs/分布式采集Agent需求与架构.md）
message Agent {
  bool enabled = 1;
  repeated string api_keys = 2;
  int32 long_poll_max_sec = 3;            // 服务端单次挂起上限，默认 55
  int32 default_task_heartbeat_sec = 4;   // 用于 T_offline，默认 10
  int32 offline_min_sec = 5;              // 默认 120
  int32 offline_heartbeat_multiplier = 6; // 默认 6，T_offline=max(min, k*interval)
  bool dev_enqueue_enabled = 7;           // 仅开发：POST /api/v1/agent/dev/enqueue 入队任务
  // 任务队列：memory=纯内存 AgentHub；mysql=多实例共用 caichip_dispatch_task（须 MySQL8+）
  string dispatch_store = 8;
  // 租约 deadline 在任务 timeout_sec 基础上的额外秒数（0 表示仅用 timeout_sec）
  int32 dispatch_lease_extra_sec = 9;
}

// ScriptStore 脚本制品落盘与对外 URL（见 docs/Agent脚本包分发-PRD与接口.md §7）
message ScriptStore {
  bool enabled = 1;               // 为 true 时 ScriptSyncHeartbeat 可按已发布 script_id 返回 sync_actions
  string root = 2;                // 本地目录，如 /var/lib/caichip/agent-scripts
  string url_prefix = 3;          // 主站路径前缀，如 /static/agent-scripts
  string public_base_url = 4;     // 生成绝对下载 URL；空则仅返回相对路径（以 / 开头）
  int32 max_upload_mb = 5;        // multipart 上限，默认 64
}

// ScriptAdmin 管理端上传/发布接口鉴权（独立于 agent.api_keys）
message ScriptAdmin {
  repeated string api_keys = 1;
}

// AgentAdmin Agent 运维只读 API（api/admin/v1）鉴权，与 agent.api_keys、script_admin 分离
message AgentAdmin {
  repeated string api_keys = 1;
}

// BomSearchCallback Agent 回写搜索结果的 HTTP/gRPC 鉴权
message BomSearchCallback {
  repeated string api_keys = 1;
}

message Platform {
  PlatformConf ickey = 1;
  PlatformConf szlcsc = 2;
  PlatformConf icgoo = 3;
}

message PlatformConf {
  string search_url = 1;
  int32 timeout = 2;
  string crawler_path = 3;
  string crawler_script = 4;
  string work_dir = 5;
}
